services:
  lk-login:
    build:
      context: .
      dockerfile: Dockerfile
    image: ldc-lk-login:latest
    container_name: ldc-lk-login
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
